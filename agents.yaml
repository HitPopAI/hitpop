# Hitpop Agent Fleet — Source of Truth
# 8 specialized video AI agents + 1 main orchestrator
# Model default: zai/glm-5-turbo (via open.bigmodel.cn)

version: "1.0.0"
default_model: "zai/glm-5-turbo"

agents:
  - id: "planner"
    name: "🧠 Planner"
    emoji: "🧠"
    role: "Task decomposition, pipeline design, progress tracking, resource allocation"
    model: "zai/glm-5-turbo"
    protected: true
    workspace: ".agents/planner"

  - id: "creative"
    name: "💡 Creative"
    emoji: "💡"
    role: "Creative direction, visual style, storyboarding, mood boards, shot composition"
    model: "zai/glm-5-turbo"
    protected: true
    workspace: ".agents/creative"

  - id: "critic"
    name: "🎯 Critic"
    emoji: "🎯"
    role: "Quality evaluation, taste veto, visual consistency check, brand alignment"
    model: "zai/glm-5-turbo"
    protected: true
    workspace: ".agents/critic"

  - id: "producer"
    name: "💻 Producer"
    emoji: "💻"
    role: "Technical execution — API calls, image/video generation, FFmpeg editing, audio mixing"
    model: "zai/glm-5-turbo"
    protected: true
    workspace: ".agents/producer"

  - id: "writer"
    name: "✍️ Writer"
    emoji: "✍️"
    role: "Script writing, narration, captions, titles, descriptions, hashtags, SEO copy"
    model: "zai/glm-5-turbo"
    protected: true
    workspace: ".agents/writer"

  - id: "reviewer"
    name: "🔍 Reviewer"
    emoji: "🔍"
    role: "Final quality gate, viewer experience check, platform compliance, delivery approval"
    model: "zai/glm-5-turbo"
    protected: true
    workspace: ".agents/reviewer"

  - id: "scout"
    name: "📰 Scout"
    emoji: "📰"
    role: "Trend monitoring, competitor analysis, reference material search, platform algorithm insights"
    model: "zai/glm-5-turbo"
    protected: true
    workspace: ".agents/scout"

  - id: "promoter"
    name: "📣 Promoter"
    emoji: "📣"
    role: "GitHub community outreach, ClawHub publishing, awesome-list submissions, content marketing drafts"
    model: "zai/glm-5-turbo"
    protected: true
    workspace: ".agents/promoter"

# Adversarial collaboration pairs
adversarial_pairs:
  - axis: "Creativity vs. Taste"
    agents: ["creative", "critic"]
    dynamic: "Creative proposes bold ideas, Critic evaluates whether they serve the goal"

  - axis: "Draft vs. Review"
    agents: ["writer", "reviewer"]
    dynamic: "Writer drafts content, Reviewer checks quality and audience fit"

  - axis: "Speed vs. Quality"
    agents: ["producer", "critic"]
    dynamic: "Producer delivers fast, Critic ensures standards are met"
